services:
  paperless-mcp:
    image: ghcr.io/mbay-odw/paperless-mcp:latest
    container_name: paperless-mcp
    restart: unless-stopped
    environment:
      # Paperless-ngx
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_KEY=${PAPERLESS_API_KEY}
      - PAPERLESS_PUBLIC_URL=${PAPERLESS_PUBLIC_URL:-${PAPERLESS_URL}}
      # Auth
      - MCP_API_KEY=${MCP_API_KEY}
      # Direct internal Authelia URL (recommended) or external via Traefik:
      # https://paperless-mcp.${DOMAIN}/api/oidc/introspection
      - OIDC_INTROSPECTION_URL=${OIDC_INTROSPECTION_URL:-http://authelia:9091/api/oidc/introspection}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-paperless-mcp}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      # Public Authelia URL – RFC 8414 OAuth Authorization Server Metadata
      - OAUTH_ISSUER=${OAUTH_ISSUER}
      # Public URL of this MCP server – RFC 9728 Protected Resource Metadata
      - MCP_SERVER_URL=${MCP_SERVER_URL:-https://paperless-mcp.${DOMAIN}}
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # SSE transport (legacy, still supported)
      - "traefik.http.routers.paperless-mcp-sse.rule=Host(`paperless-mcp.${DOMAIN}`) && PathPrefix(`/sse`)"
      - "traefik.http.routers.paperless-mcp-sse.entrypoints=websecure"
      - "traefik.http.routers.paperless-mcp-sse.service=paperless-mcp-svc"
      - "traefik.http.routers.paperless-mcp-sse.tls=true"
      - "traefik.http.routers.paperless-mcp-sse.tls.certresolver=mydnschallenge"
      - "traefik.http.routers.paperless-mcp-sse.middlewares=middlewares-rate-limit@file,middlewares-secure-headers@file"
      - "traefik.http.routers.paperless-mcp-msg.rule=Host(`paperless-mcp.${DOMAIN}`) && PathPrefix(`/messages`)"
      - "traefik.http.routers.paperless-mcp-msg.entrypoints=websecure"
      - "traefik.http.routers.paperless-mcp-msg.service=paperless-mcp-svc"
      - "traefik.http.routers.paperless-mcp-msg.tls=true"
      - "traefik.http.routers.paperless-mcp-msg.tls.certresolver=mydnschallenge"
      - "traefik.http.routers.paperless-mcp-msg.middlewares=middlewares-rate-limit@file,middlewares-secure-headers@file"
      # Streamable HTTP transport (new, preferred by Claude.ai)
      - "traefik.http.routers.paperless-mcp-http.rule=Host(`paperless-mcp.${DOMAIN}`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.paperless-mcp-http.entrypoints=websecure"
      - "traefik.http.routers.paperless-mcp-http.service=paperless-mcp-svc"
      - "traefik.http.routers.paperless-mcp-http.tls=true"
      - "traefik.http.routers.paperless-mcp-http.tls.certresolver=mydnschallenge"
      - "traefik.http.routers.paperless-mcp-http.middlewares=middlewares-rate-limit@file,middlewares-secure-headers@file"
      - "traefik.http.services.paperless-mcp-svc.loadbalancer.server.port=3000"
    networks:
      - traefik
      # Add the paperless-ngx stack network so this container can reach
      # http://webserver:8000 (internal Paperless URL).
      # Set PAPERLESS_NETWORK to the actual network name from your paperless stack,
      # e.g. "paperless_default" or just "default" in the same compose project.
      - paperless

networks:
  traefik:
    external: true
  paperless:
    external: true
    name: ${PAPERLESS_NETWORK:-paperless_default}
