services:
  paperless-mcp:
    image: ghcr.io/mbay-odw/paperless-mcp:latest
    container_name: paperless-mcp
    restart: unless-stopped
    environment:
      # Paperless-ngx
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_API_KEY=${PAPERLESS_API_KEY}
      - PAPERLESS_PUBLIC_URL=${PAPERLESS_PUBLIC_URL:-${PAPERLESS_URL}}
      # Auth
      - MCP_API_KEY=${MCP_API_KEY}
      # Direct internal Authelia URL (recommended) or external via Traefik:
      # https://paperless-mcp.${DOMAIN}/api/oidc/introspection
      - OIDC_INTROSPECTION_URL=${OIDC_INTROSPECTION_URL:-http://authelia:9091/api/oidc/introspection}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-paperless-mcp}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      # Public Authelia URL – RFC 8414 OAuth Authorization Server Metadata
      - OAUTH_ISSUER=${OAUTH_ISSUER}
      # Public URL of this MCP server – RFC 9728 Protected Resource Metadata
      - MCP_SERVER_URL=${MCP_SERVER_URL:-https://paperless-mcp.${DOMAIN}}
      # Logging level: error | warn | info | debug | trace
      - LOG_LEVEL=${LOG_LEVEL:-info}
    expose:
      - "3000"
    # Single Host(...) router – all paths under paperless-mcp.${DOMAIN} go to
    # this container, including /.well-known/* (RFC 8414 + RFC 9728), /sse,
    # /messages, /mcp. This is the same pattern Marco's upstream
    # (marco2901/paperless-mcp-server) uses and the only one that lets
    # Claude.ai bootstrap the OAuth flow correctly, because Authelia does
    # not serve RFC 9728 (oauth-protected-resource) by default.
    #
    # IMPORTANT: do NOT mount a Traefik file-provider config that intercepts
    # /.well-known/* on this host – that would short-circuit the discovery
    # to Authelia, which returns 404 for RFC 9728 and breaks the flow.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.paperless-mcp.rule=Host(`paperless-mcp.${DOMAIN}`)"
      - "traefik.http.routers.paperless-mcp.entrypoints=websecure"
      - "traefik.http.routers.paperless-mcp.tls=true"
      - "traefik.http.routers.paperless-mcp.tls.certresolver=mydnschallenge"
      - "traefik.http.routers.paperless-mcp.middlewares=middlewares-rate-limit@file,middlewares-secure-headers@file"
      - "traefik.http.services.paperless-mcp.loadbalancer.server.port=3000"
    networks:
      - traefik
      # Add the paperless-ngx stack network so this container can reach
      # http://webserver:8000 (internal Paperless URL).
      # Set PAPERLESS_NETWORK to the actual network name from your paperless
      # stack, e.g. "paperless_default" or just "default" in the same compose
      # project.
      - paperless

networks:
  traefik:
    external: true
  paperless:
    external: true
    name: ${PAPERLESS_NETWORK:-paperless_default}
